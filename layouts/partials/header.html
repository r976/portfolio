<header class="site-header">
  <div class="shell nav-wrap">
    <a class="brand" href="{{ site.Home.RelPermalink }}" aria-label="Home">
      <span class="brand-mark">ME</span>
      <span>{{ site.Params.name }}</span>
    </a>
    <nav aria-label="Primary navigation">
      <ul class="nav-list">
        {{ range site.Menus.main }}
          <li><a class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}" href="{{ .URL | relURL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
