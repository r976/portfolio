<article class="project-card" data-tags="{{ delimit .Params.tags "," | lower }}">
  <div class="card-top mono">
    <span>{{ .Params.status | default "Project" }}</span>
    <span>{{ .Date.Format "2006" }}</span>
  </div>
  <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
  <p>{{ .Params.summary }}</p>
  <div class="tag-row">
    {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
  </div>
  <a class="card-link" href="{{ .RelPermalink }}" aria-label="Read {{ .Title }}">View case study →</a>
</article>
