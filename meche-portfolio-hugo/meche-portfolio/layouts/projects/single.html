{{ define "main" }}
<article class="shell project-detail section-pad">
  <a class="back-link mono" href="{{ "/projects/" | relURL }}">← PROJECT ARCHIVE</a>
  <header class="detail-header">
    <div>
      <p class="eyebrow mono">{{ delimit .Params.tags " / " }}</p>
      <h1>{{ .Title }}</h1>
      <p class="lede">{{ .Params.summary }}</p>
    </div>
    <dl class="spec-list mono">
      <div><dt>YEAR</dt><dd>{{ .Date.Format "2006" }}</dd></div>
      <div><dt>STATUS</dt><dd>{{ .Params.status }}</dd></div>
      {{ with .Params.github }}<div><dt>CODE</dt><dd><a href="{{ . }}">GitHub ↗</a></dd></div>{{ end }}
      {{ with .Params.demo }}<div><dt>DEMO</dt><dd><a href="{{ . }}">Open ↗</a></dd></div>{{ end }}
    </dl>
  </header>
  <div class="prose">{{ .Content }}</div>
</article>
{{ end }}
